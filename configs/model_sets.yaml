model_sets:
  store-smoke:
    name: store-smoke
    description: First model currently present in the configured Skulk model store.
    selectors:
      - source: store
        id_regex: ".*"
        max_models: 1

  store-all:
    name: store-all
    description: Every model currently present in the configured Skulk model store.
    selectors:
      - source: store
        id_regex: ".*"

  catalog-small-text:
    name: catalog-small-text
    description: Small text-generation candidates discovered from catalog/store metadata.
    selectors:
      - source: both
        id_regex: "(instruct|chat|qwen|llama|gemma|mistral|phi)"
        max_models: 5

  embeddings:
    name: embeddings
    description: Common sentence-transformer embedding smoke target.
    models:
      - sentence-transformers/all-MiniLM-L6-v2

  vision:
    name: vision
    description: Vision-capable models discovered from catalog/store metadata.
    selectors:
      - source: both
        id_regex: "(vision|vl|multimodal)"
        max_models: 5

  served-spec-draft-simple:
    name: served-spec-draft-simple
    description: Models whose cards declare llama_server draft_simple speculation.
    selectors:
      - source: both
        id_regex: ".*"
        served_spec_types_any:
          - draft_simple

  served-spec-draft-eagle3:
    name: served-spec-draft-eagle3
    description: Models whose cards declare llama_server draft_eagle3 speculation.
    selectors:
      - source: both
        id_regex: ".*"
        served_spec_types_any:
          - draft_eagle3
