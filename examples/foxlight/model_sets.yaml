model_sets:
  smoke:
    name: smoke
    description: Store-backed default for harness validation on the Kite cluster.
    models:
      - mlx-community/Qwen3.5-9B-MLX-4bit

  qwen35-small:
    name: qwen35-small
    description: Qwen 3.5 small models useful for MTP and fast loop checks.
    models:
      - mlx-community/Qwen3.5-9B-4bit
      - mlx-community/Qwen3.5-9B-MLX-4bit
      - mlx-community/Qwen3.5-27B-4bit

  gemma4-family:
    name: gemma4-family
    description: Gemma 4 family models discovered from the live Skulk catalog plus known seeds.
    selectors:
      - source: both
        id_regex: "gemma[-_]?4"
        max_models: 20
    huggingface_seeds:
      - model_id: mlx-community/gemma-4-e2b-it-8bit
        reason: Small Gemma 4 smoke candidate.
      - model_id: mlx-community/gemma-4-e4b-it-8bit
        reason: Gemma 4 E4B candidate.
      - model_id: mlx-community/gemma-4-12B-it-4bit
        reason: Gemma 4 12B candidate.
      - model_id: mlx-community/gemma-4-26b-a4b-it-4bit
        reason: Gemma 4 A4B candidate.

  moe-family:
    name: moe-family
    description: Mixture-of-experts style models from common Skulk families.
    selectors:
      - source: both
        id_regex: "(A3B|A4B|A10B|A17B|A22B|A35B|MoE|Mixtral|DeepSeek|Kimi|MiniMax)"
        max_models: 40

  mtp-tests:
    name: mtp-tests
    description: Models expected to exercise speculative decoding paths.
    selectors:
      - source: both
        id_regex: "(Qwen3\\.5|DeepSeek|gemma[-_]?4)"
        max_models: 30

  gpt-oss-20b:
    name: gpt-oss-20b
    description: GPT-OSS 20B target for broad harness and tool-calling coverage.
    models:
      - mlx-community/gpt-oss-20b-MXFP4-Q8
    selectors:
      - source: both
        id_regex: "gpt[-_]?oss[-_]?20b"
        max_models: 5
    huggingface_seeds:
      - model_id: mlx-community/gpt-oss-20b-MXFP4-Q8
        reason: Store-backed GPT-OSS 20B Q8 candidate used on the Kite cluster.

  store-all:
    name: store-all
    description: Every model currently present in the configured Skulk model store.
    selectors:
      - source: store
        id_regex: ".*"

  tensor-sharding:
    name: tensor-sharding
    description: Tensor-parallel smoke target for the kite TP pair.
    models:
      - mlx-community/Qwen3.5-9B-4bit

  context-admission:
    name: context-admission
    description: Small text model used to verify oversized requests fail cleanly.
    models:
      - mlx-community/Qwen3.5-9B-4bit

  embeddings:
    name: embeddings
    description: Embedding runner smoke target.
    models:
      - sentence-transformers/all-MiniLM-L6-v2

  speech-tts:
    name: speech-tts
    description: >-
      Text-to-speech targets for Skulk's mlx_audio speech runner. Explicit HF
      IDs keep the fleet battery reproducible and avoid optional-dependency
      model families that are not part of the production fleet profile.
    models:
      - mlx-community/fish-audio-s2-pro-8bit
      - mlx-community/Qwen3-TTS-12Hz-0.6B-CustomVoice-4bit

  speech-tts-candidates:
    name: speech-tts-candidates
    description: >-
      Loadable TTS candidates retained for explicit semantic requalification.
      These models are excluded from the standard battery until every semantic
      prompt meets its configured word-error-rate ceiling.
    models:
      - mlx-community/LongCat-AudioDiT-1B-4bit

  speech-tts-streaming:
    name: speech-tts-streaming
    description: >-
      Text-to-speech targets whose Skulk model cards explicitly advertise
      streaming support. This intentionally stays selector-only so the e2e
      battery never forces a model whose card has not passed streaming
      validation.
    selectors:
      - source: both
        capabilities_any:
          - tts
        require_audio_streaming: true
        max_models: 2

  speech-roundtrip-tts:
    name: speech-roundtrip-tts
    description: >-
      Text-to-speech target used by the production TTS-to-STT roundtrip. This is
      intentionally narrower than speech-tts so semantic transcription checks
      run on the TTS model that passed the full English qualification set.
    models:
      - mlx-community/fish-audio-s2-pro-8bit

  speech-stt:
    name: speech-stt
    description: >-
      Speech-to-text targets for Skulk's mlx_audio speech runner. The roundtrip
      suite uses this class of model as its secondary mounted transcription
      target.
    models:
      - mlx-community/parakeet-tdt-0.6b-v3

  speech-stt-realtime:
    name: speech-stt-realtime
    description: >-
      Realtime speech-to-text target whose Skulk card and mlx_audio runtime
      expose a true incremental streaming session.
    models:
      - mlx-community/Voxtral-Mini-4B-Realtime-2602-4bit

  speech-translation-tts:
    name: speech-translation-tts
    description: >-
      Multilingual TTS fixture model for the speech-to-English translation
      roundtrip. Canary is mounted as the secondary model by the test.
    models:
      - mlx-community/fish-audio-s2-pro-8bit

  speech-reference-tts:
    name: speech-reference-tts
    description: >-
      Reference-conditioning TTS target validated with a generated donor clip.
    models:
      - mlx-community/Qwen3-TTS-12Hz-0.6B-Base-4bit

  speech-voice-catalog-tts:
    name: speech-voice-catalog-tts
    description: TTS target with a qualified static built-in voice inventory.
    models:
      - mlx-community/Qwen3-TTS-12Hz-0.6B-CustomVoice-4bit

  vision:
    name: vision
    description: >-
      Vision models spanning Qwen3-VL, Qwen3.5 native multimodal, Gemma 3n,
      and Gemma 4 families. These explicit smoke targets are all preview-placeable
      on the Foxlight fleet; the separate vision-inventory set records every
      larger or platform-incompatible vision card that cannot be placed.
    models:
      - mlx-community/Qwen3-VL-4B-Instruct-4bit
      - mlx-community/Qwen3.5-2B-4bit
      - mlx-community/gemma-3n-E2B-it-4bit
      - mlx-community/gemma-4-e2b-it-8bit

  vision-inventory:
    name: vision-inventory
    description: >-
      Every catalog/store model declaring resolved vision capability. Use this
      for the exhaustive placeability and API/dashboard qualification pass.
    selectors:
      - source: both
        capabilities_any:
          - vision

  served-spec-draft-simple:
    name: served-spec-draft-simple
    description: Models whose cards declare llama_server draft_simple speculation.
    selectors:
      - source: both
        id_regex: ".*"
        served_spec_types_any:
          - draft_simple

  served-spec-draft-eagle3:
    name: served-spec-draft-eagle3
    description: Models whose cards declare llama_server draft_eagle3 speculation.
    selectors:
      - source: both
        id_regex: ".*"
        served_spec_types_any:
          - draft_eagle3

  # --- Curated e2e matrix (explicitly pinned to staged models, not regex, so
  # --- the matrix is reproducible and does not drift with the live catalog).

  dense-singles:
    name: dense-singles
    description: Dense models that fit a single node. The single-node leg of the matrix.
    models:
      - mlx-community/Qwen3.5-9B-4bit
      - mlx-community/gemma-4-12B-it-4bit
      - mlx-community/NVIDIA-Nemotron-Nano-9B-v2-4bits
      - mlx-community/Meta-Llama-3.1-8B-Instruct-4bit
      - mlx-community/GLM-4.7-Flash-4bit

  moe:
    name: moe
    description: Mixture-of-experts models. Larger ones widen to multi-node automatically.
    models:
      - mlx-community/Qwen3-30B-A3B-4bit
      - mlx-community/gemma-4-26b-a4b-it-4bit
      - mlx-community/gpt-oss-20b-MXFP4-Q8
      - mlx-community/Moonlight-16B-A3B-Instruct-4-bit
      - mlx-community/Qwen3.5-35B-A3B-4bit
      # NVFP4 is not a supported Skulk runtime format: the runner connects but the
      # model never loads (stuck "LOADING / Connecting"), so it only burns the
      # placement-ready timeout. Removed from the battery.
      # - mlx-community/Qwen3.6-35B-A3B-nvfp4

  multinode-large:
    name: multinode-large
    description: Large dense + MTP-capable models forced across nodes. The coherence-critical leg (the #297 garble path runs here under sampled multi-node MTP).
    models:
      - mlx-community/Qwen3.5-27B-4bit
      - mlx-community/Qwen3.6-27B-4bit
      - mlx-community/gemma-4-31b-it-4bit
      - mlx-community/Qwen3.5-35B-A3B-4bit

  gguf-llama-cpp:
    name: gguf-llama-cpp
    description: >-
      GGUF models served by the llama.cpp engine on a non-Mac GPU node (e.g. an
      AMD Strix Halo box, kite4). The card's compatible_backends are llama.cpp
      tags, so Skulk's placement filter routes these only to a llama_cpp node --
      no harness-side node pinning needed. Small + already staged so the run is
      fast and self-contained.
    models:
      - unsloth/Llama-3.2-1B-Instruct-GGUF

  pooled-rpc:
    name: pooled-rpc
    description: >-
      Multi-node GGUF memory pooling over llama.cpp RPC (Skulk #328): one
      driver node runs llama-server --rpc against donor rpc-servers. Pair with
      the llama-cpp test set and force min_nodes 2 + instance_meta LlamaRpc so
      the placement pools the AMD pair (driver kite4, donor kite5) instead of
      taking the single-node path. Uses the 120B MoE the pair validated live.
    models:
      - bartowski/openai_gpt-oss-120b-GGUF

  gguf-big:
    name: gguf-big
    description: >-
      Large GGUF models that exceed Mac-mini VRAM and run on the 128GB AMD node
      (kite4) via llama.cpp -- the capacity half of the heterogeneous story (a
      class of models the minis cannot hold at all, independent of engine). Pair
      with the llama-cpp test set. Single-node llama.cpp; placement routes here by
      the GGUF cards' llama.cpp compatible_backends.
    models:
      - Qwen/Qwen2.5-7B-Instruct-GGUF
      - unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF
      - unsloth/gemma-4-31B-it-GGUF
      - bartowski/Llama-3.3-70B-Instruct-GGUF
      - bartowski/openai_gpt-oss-120b-GGUF

  mtp-served:
    name: mtp-served
    description: >-
      Native multi-token-prediction GGUFs served via the llama_server engine
      (llama.cpp --spec-type draft-mtp) on a GPU node (kite4). The cards declare
      compatible_backends=llama_server-* so placement routes them to a node with
      a llama-server binary; runtime.served_spec_type=draft_mtp turns on the
      built-in MTP heads. Spread across family/size to benchmark draft-mtp:
      small dense, mid dense, and MoE; plus Gemma 4 31B, which is the OTHER MTP
      shape (a separate draft assistant GGUF via --model-draft) and a reasoning
      model with a custom channel parser. (A non-Qwen baked-in-heads MTP GGUF is
      still a follow-up; the GLM-4.7-Flash MTP upload tested was missing its MTP
      tensors.) Run with --ensure-store-downloads --delete-created-instances
      --delete-staged-models so weights stage from the store and are evicted after.
    models:
      - unsloth/Qwen3.5-9B-MTP-GGUF
      - unsloth/Qwen3.6-27B-MTP-GGUF
      - unsloth/Qwen3.6-35B-A3B-MTP-GGUF
      # Gemma 4 = the DRAFT-MODEL MTP shape (a separate assistant GGUF via
      # --model-draft), not baked-in heads like the Qwen cards above, AND a
      # reasoning model whose thinking arrives as literal <|channel> markers the
      # served runner re-parses (output_parser=gemma4). The built-in card
      # co-fetches the base + our published FoxlightAI draft through the store, so
      # this exercises the draft-model path + channel parser end to end.
      - google/gemma-4-31B-it-qat-q4_0-gguf

  mtp-served-9b:
    name: mtp-served-9b
    description: >-
      A single small native-MTP GGUF (Qwen3.5 9B, draft-mtp) to exercise the
      served engine on the SMALLER AMD node (kite5, 32 GB VRAM). The planner
      prefers the larger AMD node (kite4, 128 GB) for every GGUF/served
      placement, so kite5's llama_server + draft-mtp path is never hit by the
      main mtp-served set; pair this with the mtp-correctness test set and
      `--exclude-nodes kite4` to force placement onto kite5. Kept to one small
      model so it fits kite5's VRAM without a large GTT spill and stays fast.
    models:
      - unsloth/Qwen3.5-9B-MTP-GGUF

  perf-check:
    name: perf-check
    description: >
      Lean post-deploy performance regression, one model per engine on a single
      node so the planner routes each by backend: an MLX dense model and an MLX
      MoE model land on the Apple Silicon nodes, and a served-MTP GGUF lands on
      the AMD node. Pair with the throughput test set. For the multi-node MLX
      path use perf-multi (below).
    models:
      - mlx-community/Qwen3.5-9B-4bit        # MLX dense single-node (+ MTP)
      - mlx-community/gpt-oss-20b-MXFP4-Q8   # MLX MoE single-node
      - unsloth/Qwen3.5-9B-MTP-GGUF          # served MTP on the AMD node

  perf-multi:
    name: perf-multi
    description: >
      Multi-node MLX performance check: a dense model forced across a 2-node
      pipeline (run with --min-nodes 2) so the post-deploy check exercises the
      sharded ring and multi-node speculative decoding, not just single-node.
    models:
      - mlx-community/Qwen3.5-27B-4bit

  multinode-cost:
    name: multinode-cost
    description: >-
      GGUF models that all fit kite4 (128GB Strix Halo) alone, spanning a size
      ladder (1B -> 120B). Used by run_multinode_cost_benchmark.sh to measure
      the cost of RPC memory pooling: each model runs single-node on kite4 and
      forced across kite4+kite5, so the throughput delta is pure interconnect +
      split overhead (the model never NEEDS the second node). Small models are
      the worst case for pooling (interconnect dominates); large ones amortize
      it. Ordered small -> large so the published table reads as a curve.
    models:
      - unsloth/Llama-3.2-1B-Instruct-GGUF
      - Qwen/Qwen2.5-7B-Instruct-GGUF
      - bartowski/openai_gpt-oss-20b-GGUF
      - unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF
      - unsloth/gemma-4-31B-it-GGUF
      - bartowski/Llama-3.3-70B-Instruct-GGUF
      - bartowski/openai_gpt-oss-120b-GGUF

  # --- Concurrency suite (non-MTP text generators, small -> large) ------------
  # Curated one-per-category sets for the throughput-vs-concurrency benchmark.
  # Deliberately plain text models (no MTP / speculative decoding) so the curve
  # measures raw concurrent-serving behavior, not draft acceptance.
  concurrency-mlx:
    name: concurrency-mlx
    description: >-
      Single-node MLX (rank 0), small -> large: a tiny dense (1B, the
      overhead-dominated small end), a small dense (9B), and a larger MoE that
      still fits one Apple node. The single-rank leg of the ordinary concurrency
      matrix; non-toggleable reasoning models use the reasoning-sized suite.
    models:
      - mlx-community/Llama-3.2-1B-Instruct-4bit
      - mlx-community/Qwen3.5-9B-4bit
      - mlx-community/Qwen3-30B-A3B-4bit

  concurrency-mlx-reasoning:
    name: concurrency-mlx-reasoning
    description: >-
      Single-node MLX reasoning model. Pair with concurrency-reasoning-16 so
      GPT-OSS has enough output budget to finish its non-disableable analysis
      while the MLX sweep remains capped at the fleet policy
      SKULK_MAX_CONCURRENT_REQUESTS=16 (Skulk code default: 8).
    models:
      - mlx-community/gpt-oss-20b-MXFP4-Q8

  concurrency-mlx-multinode:
    name: concurrency-mlx-multinode
    description: >-
      Multi-rank MLX: a large dense forced across Apple nodes (pair with
      --sharding Tensor --min-nodes 2). The multi-rank leg for MLX -- concurrency
      behavior with cross-rank coordination in the loop.
    models:
      - mlx-community/Qwen3.5-27B-4bit

  concurrency-gguf:
    name: concurrency-gguf
    description: >-
      Single-node llama.cpp on an AMD GPU node (kite4), small -> large: a tiny
      1B (the overhead-dominated small end), a 7B, and a 30B MoE. The
      single-rank leg for ordinary served/GGUF models, where continuous batching
      (--parallel) actually scales aggregate throughput. The reasoning 120B uses
      the dedicated concurrency-120b set.
    models:
      - unsloth/Llama-3.2-1B-Instruct-GGUF
      - Qwen/Qwen2.5-7B-Instruct-GGUF
      - unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF

  concurrency-gguf-pooled:
    name: concurrency-gguf-pooled
    description: >-
      Multi-rank llama.cpp memory pooling over RPC (driver kite4 + donor kite5,
      Skulk #328). Pair with --min-nodes 2 --instance-meta LlamaRpc. The
      multi-rank leg for the GGUF engine.
    models:
      - bartowski/openai_gpt-oss-120b-GGUF

  concurrency-1b:
    name: concurrency-1b
    description: >-
      Just the tiny dense 1B on MLX, for the small/overhead-dominated end of the
      concurrency curve (run with the concurrency-16 test set).
    models:
      - mlx-community/Llama-3.2-1B-Instruct-4bit

  concurrency-120b:
    name: concurrency-120b
    description: >-
      Just the 120B GGUF (gpt-oss) single-node on the AMD served path, for the
      large/reasoning end of the concurrency curve. Pair with the
      concurrency-reasoning test set (1536-token budget) so the harmony analysis
      channel does not starve the final answer.
    models:
      - bartowski/openai_gpt-oss-120b-GGUF

  tool-served:
    name: tool-served
    description: >-
      Just the Qwen3-Coder-30B-A3B agentic coding GGUF, which defaults to the
      llama_server engine (post-#607). For validating served tool calling e2e.
    models:
      - unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF
