# Copy to an ignored local file and replace every placeholder before setting
# eligible: true. Never commit real hosts, paths, keys, or fleet-lock values.
request_timeout_s: 30
generation_timeout_s: 1800
stream_read_timeout_s: 120
output_dir: runs
model_sets_path: examples/foxlight/model_sets.yaml
test_sets_path: examples/foxlight/test_sets.yaml

fleet_lock:
  remote: git@github.com:your-org/private-coordination.git
  holder: release-operator
  branch: main
  path: coordination/fleet-lock.json
  default_ttl_s: 3600

fresh_install:
  required_platforms: [apple, amd, nvidia]
  snapshot_root: fresh-install-snapshots
  snapshot_retention_days: 30
  lease_ttl_s: 3600
  emergency_lease_ttl_s: 21600
  targets:
    release-apple:
      kind: physical
      platform: apple
      hardware_class: apple-silicon-32gb
      eligible: false
      exclusion_reason: replace placeholders before enabling
      ssh_host: replace-apple-host
      service_manager: launchd
      service_stop_command: replace-with-targeted-launchctl-stop
      service_start_command: replace-with-targeted-launchctl-start
      service_status_command: replace-with-stable-launchctl-status
      isolation_enter_command: replace-with-target-local-skulk-traffic-isolation
      isolation_exit_command: replace-with-target-local-isolation-removal
      original_checkout: replace-with-existing-checkout
      original_config_paths:
        - replace-with-existing-skulk-yaml
      expected_backends: [mlx, mlx-metal]
      expected_data_transport: zenoh
      vision_contract: positive
      text_models:
        - mlx-community/Qwen3.5-2B-4bit
        - mlx-community/Qwen3-VL-4B-Instruct-4bit
      vision_models:
        - mlx-community/Qwen3.5-2B-4bit
        - mlx-community/Qwen3-VL-4B-Instruct-4bit

    release-amd:
      kind: physical
      platform: amd
      hardware_class: amd-rocm-vulkan
      eligible: false
      exclusion_reason: replace placeholders before enabling
      ssh_host: replace-amd-host
      service_manager: systemd
      service_stop_command: replace-with-targeted-systemctl-stop
      service_start_command: replace-with-targeted-systemctl-start
      service_status_command: replace-with-stable-systemctl-status
      isolation_enter_command: replace-with-target-local-skulk-traffic-isolation
      isolation_exit_command: replace-with-target-local-isolation-removal
      original_checkout: replace-with-existing-checkout
      original_config_paths:
        - replace-with-existing-skulk-yaml
      expected_backends: [llama_server, llama_server-vulkan]
      expected_data_transport: zenoh
      vision_contract: unavailable
      text_models:
        - unsloth/Llama-3.2-1B-Instruct-GGUF

    release-nvidia:
      kind: runpod
      platform: nvidia
      hardware_class: nvidia-cuda
      eligible: false
      exclusion_reason: replace credentials and enable deliberately
      expected_backends: [llama_server, llama_server-cuda]
      expected_data_transport: zenoh
      vision_contract: unavailable
      text_models:
        - unsloth/Llama-3.2-1B-Instruct-GGUF

  runpod:
    ssh_public_key_file: ~/.ssh/id_ed25519.pub
    ssh_private_key_file: ~/.ssh/id_ed25519
    image_name: nvidia/cuda:12.8.1-devel-ubuntu24.04
    gpu_type_ids:
      - NVIDIA L4
      - NVIDIA A40
    cloud_type: SECURE
    container_disk_gb: 80
    maximum_hourly_cost_usd: 4
    maximum_runtime_s: 10800
    require_no_network_volume: true
